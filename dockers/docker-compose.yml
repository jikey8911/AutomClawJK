services:
  openclaw:
    build:
      context: ../
      dockerfile: dockers/openclaw/Dockerfile
    container_name: openclaw_agent
    ports:
      - "5000:5000"
    volumes:
      - ../openclaw:/app/openclaw_autom
    environment:
      - ENVIRONMENT=development
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  backend:
    build:
      context: ../
      dockerfile: dockers/backend/Dockerfile
    container_name: automclaw_backend
    ports:
      - "8000:8000"
    volumes:
      - ../platform/backend:/app
    environment:
      - OPENCLAW_URL=http://openclaw:5000
      - OLLAMA_BASE_URL=http://host.docker.internal:11435
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - openclaw
    restart: unless-stopped

  frontend:
    build:
      context: ../
      dockerfile: dockers/frontend/Dockerfile
    container_name: automclaw_frontend
    ports:
      - "3000:80"
    volumes:
      - ../platform/frontend:/app
    depends_on:
      - backend
    restart: unless-stopped
